<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent | The Coffee Shop</title>
<style>
body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: url("images/order-bg.png") no-repeat center center fixed;
      background-size: cover;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    .confirmation-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease-out;
    }

    .confirmation-box h2 {
      color: #A47148;
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .confirmation-box p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #5a3e2b;
    }

    .confirmation-box a {
      display: inline-block;
      text-decoration: none;
      background-color: #8b5e3c;
      color: #fff;
      padding: 12px 30px;
      border-radius: 25px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .confirmation-box a:hover {
      background-color: #d4a373;
    }
</style>
</head>

<body>
  <div class="confirmation-box">
    <h1>☕ Message Sent!</h1>
    <p>Thank you for contacting <b>The Coffee Shop</b>.<br>
    Your message has been received successfully.</p>
    <a href="home.html">Return Home</a>
  </div>
  
</body>
</html>
